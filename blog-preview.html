<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — SEO Suite</title>
<meta name="theme-color" content="#000000">
<script src="js/libs/jsband-min.js"></script>
<script src="js/blob-min.js"></script>
<style>
@font-face {
    font-family: 'Grumpy 24';
    src: url('css/fonts/Grumpy-Black24.woff2') format('woff2'),
        url('css/fonts/Grumpy-Black24.woff') format('woff'),
        url('css/fonts/Grumpy-Black24.ttf') format('truetype');
    font-weight: 900;
    font-style: normal;
}
html, body { background: #000; margin: 0; padding: 0; width: 100%; max-width: 100%; }
html { overflow-x: hidden; }
body { overflow-x: hidden; cursor: auto; touch-action: pan-y; }
* { box-sizing: border-box; }

/* Sphere stays fixed behind EVERYTHING for the whole page — the carousel
   below is a continuation of this same dark scene, not a new section. */
#blob_container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
    z-index: 0;
}

#hero {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
#page-title {
    margin: 0;
    text-align: center;
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: clamp(2.6rem, 7vw, 5rem);
    line-height: 1.05;
    color: #fff;
}

/* --- Blog preview carousel: same dark backdrop, no section break --- */
#carousel-section {
    position: relative;
    z-index: 1;
    background: transparent;
    padding: 40px 6% 140px;
}
.carousel-grid {
    max-width: 1000px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
}
.carousel-stage {
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 300px;
    margin: 0 auto;
    overflow: hidden;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
}
.carousel-card {
    position: absolute;
    top: 0;
    left: 50%;
    width: 220px;
    height: 280px;
    margin-left: -110px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.25);
    background: #000;
    opacity: 0;
    transition: transform .35s ease, opacity .35s ease, border-color .35s ease;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 22px;
    box-sizing: border-box;
    cursor: pointer;
}
.carousel-card.active {
    z-index: 10;
    pointer-events: auto;
    border-color: rgba(255,255,255,0.55);
    opacity: 1;
    cursor: default;
}
.carousel-card.prev,
.carousel-card.next {
    z-index: 5;
    pointer-events: auto;
    opacity: 0.4;
}
.carousel-card-index {
    position: absolute;
    top: 20px; left: 26px;
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: 4rem;
    line-height: 1;
    color: rgba(255,255,255,0.08);
}
.carousel-card-cat {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin: 0 0 10px;
    position: relative;
}
.carousel-card-title {
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: 1.55rem;
    line-height: 1.18;
    color: #fff;
    margin: 0;
    position: relative;
}

.carousel-text { padding: 16px 0; }
.carousel-cat {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin: 0 0 8px;
}
.carousel-title {
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: 2rem;
    line-height: 1.15;
    margin: 0 0 24px;
    color: #fff;
    min-height: 96px;
}
.carousel-quote {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    line-height: 1.7;
    color: rgba(255,255,255,0.6);
    margin: 0;
    min-height: 110px;
}
.carousel-controls {
    display: flex;
    gap: 14px;
    margin-top: 32px;
}
.carousel-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease, transform 0.2s ease;
}
.carousel-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }

@media (max-width: 720px) {
    .carousel-grid { grid-template-columns: 1fr; gap: 32px; }
    .carousel-text { text-align: center; }
    .carousel-controls { justify-content: center; }
    .carousel-title { min-height: 0; }
    .carousel-quote { min-height: 0; }
}
</style>
</head>
<body>

<div id="blob_container"></div>

<div id="hero">
    <h1 id="page-title">Learn, Explore<br>&amp; Grow</h1>
</div>

<section id="carousel-section">
    <div class="carousel-grid">
        <div class="carousel-stage" id="carousel-stage"></div>
        <div class="carousel-text">
            <p class="carousel-cat" id="carousel-cat"></p>
            <h2 class="carousel-title" id="carousel-title"></h2>
            <p class="carousel-quote" id="carousel-quote"></p>
            <div class="carousel-controls">
                <button class="carousel-btn" id="carousel-prev" aria-label="Previous post">&larr;</button>
                <button class="carousel-btn" id="carousel-next" aria-label="Next post">&rarr;</button>
            </div>
        </div>
    </div>
</section>

<script>
var shape = { wave1: {amplitude: 200, frequency: 7.692, phase: 6.283}, wave2: {amplitude: 200, frequency: 7.912, phase: 6.283}, wave3: {amplitude: 200, frequency: 10, phase: 6.283} };
new BlobAnimation("blob_container", {
    BLOB_SIZE: 220,
    BLOB_DISTANCE: 1000,
    DETALISATION: 60,
    PERSPECTIVE_DISTORTION: 1,
    ROTATION_SPEED: 5,
    DOT_SIZE: (window.innerWidth > 480) ? 1.021 : 0.6,
    DOT_COLOR: "#d0d0d0",
    MOUSE_DISTANCE_MIN: 20,
    MOUSE_DISTANCE_MAX: 400,
    MOUSE_SENSITIVITY: 1,
    INERTIAL_TIME: 4,
    INITIAL_SHAPE: shape,
    USE_WAVE_MOTION: true,
    USE_WAVE_SWING: true,
    USE_MORPHING: true,
    MORPHING_AUTOPLAY: true,
    MORPHING_DURATION: 1,
    MORPHING_DELAY: 0,
    MORPHING_TRANSITION_TYPE: "cubic",
    MORPHING_SHAPES: [shape],
    WAVE_1_MOTION_SPEED: 1.3,
    WAVE_2_MOTION_SPEED: 0.8
});
</script>

<script>
(function(){
    var posts = [
        {
            title: "Master SEO",
            cat: "AI Search",
            quote: "Increase organic traffic, improve search rankings, and build long-term visibility with proven search engine optimization strategies.",
            img: "https://images.unsplash.com/photo-1571171637578-41bc2dd41cd2?w=700&auto=format&fit=crop&q=80"
        },
        {
            title: "Unlock AI-Powered SEO",
            cat: "SEO",
            quote: "Discover how artificial intelligence is transforming keyword research, content creation, technical SEO, and search performance.",
            img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=700&auto=format&fit=crop&q=80"
        },
        {
            title: "Boost Website Performance",
            cat: "Performance",
            quote: "Learn how faster loading times, Core Web Vitals, and technical optimization improve user experience, SEO rankings, and conversion rates.",
            img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=700&auto=format&fit=crop&q=80"
        },
        {
            title: "Create High-Converting Web Designs",
            cat: "Design",
            quote: "Explore modern web design principles, responsive development, and UX best practices that turn visitors into loyal customers.",
            img: "https://images.unsplash.com/photo-1522542550221-31fd19575a2d?w=700&auto=format&fit=crop&q=80"
        }
    ];

    var stage = document.getElementById('carousel-stage');
    var catEl = document.getElementById('carousel-cat');
    var titleEl = document.getElementById('carousel-title');
    var quoteEl = document.getElementById('carousel-quote');
    var active = 0;
    var cards = [];

    posts.forEach(function(post, i){
        var card = document.createElement('div');
        card.className = 'carousel-card';

        var index = document.createElement('div');
        index.className = 'carousel-card-index';
        index.textContent = String(i + 1).padStart(2, '0');
        card.appendChild(index);

        var cat = document.createElement('p');
        cat.className = 'carousel-card-cat';
        cat.textContent = post.cat;
        card.appendChild(cat);

        var title = document.createElement('h3');
        title.className = 'carousel-card-title';
        title.textContent = post.title;
        card.appendChild(title);

        stage.appendChild(card);
        cards.push(card);
    });

    var SIDE_OFFSET = 150;

    function render(){
        var n = posts.length;
        cards.forEach(function(card, i){
            card.classList.remove('active', 'prev', 'next');
            // Position relative to active, wrapping both directions so the
            // deck always rotates — never a dead end at either edge.
            var rel = i - active;
            if (rel > n / 2) rel -= n;
            if (rel < -n / 2) rel += n;

            if (rel === 0) {
                card.classList.add('active');
                card.style.transform = 'translateX(0px) scale(1)';
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
            } else if (rel === -1 || (n === 2 && rel === 1)) {
                card.classList.add('prev');
                card.style.transform = 'translateX(-' + SIDE_OFFSET + 'px) scale(0.82)';
                card.style.opacity = '0.4';
                card.style.pointerEvents = 'auto';
            } else if (rel === 1) {
                card.classList.add('next');
                card.style.transform = 'translateX(' + SIDE_OFFSET + 'px) scale(0.82)';
                card.style.opacity = '0.4';
                card.style.pointerEvents = 'auto';
            } else {
                card.style.opacity = '0';
                card.style.transform = 'translateX(0px) scale(0.7)';
                card.style.pointerEvents = 'none';
            }
        });
        var post = posts[active];
        catEl.textContent = post.cat;
        titleEl.textContent = post.title;
        quoteEl.textContent = post.quote;
    }

    function next(){ active = (active + 1) % posts.length; render(); }
    function prev(){ active = (active - 1 + posts.length) % posts.length; render(); }

    document.getElementById('carousel-next').addEventListener('click', next);
    document.getElementById('carousel-prev').addEventListener('click', prev);

    cards.forEach(function(card, i){
        card.addEventListener('click', function(){
            if (card.classList.contains('prev')) prev();
            else if (card.classList.contains('next')) next();
        });
    });

    // Touch swipe (mobile) + mouse drag (desktop) — both directions, circular.
    var startX = null, dragging = false;
    function onStart(x){ startX = x; dragging = true; }
    function onEnd(x){
        if (!dragging || startX === null) return;
        dragging = false;
        var delta = x - startX;
        startX = null;
        if (Math.abs(delta) < 30) return;
        if (delta < 0) next(); else prev();
    }
    stage.addEventListener('touchstart', function(e){ onStart(e.touches[0].clientX); }, { passive: true });
    stage.addEventListener('touchend', function(e){ onEnd(e.changedTouches[0].clientX); }, { passive: true });
    stage.addEventListener('mousedown', function(e){ onStart(e.clientX); });
    window.addEventListener('mouseup', function(e){ if (dragging) onEnd(e.clientX); });

    render();
    setInterval(next, 5000);
})();
</script>

</body>
</html>
