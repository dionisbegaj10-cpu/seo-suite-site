<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — SEO Suite</title>
<meta name="theme-color" content="#000000">
<script src="js/libs/jsband-min.js"></script>
<script src="js/blob-min.js"></script>
<style>
html, body { background: #000; margin: 0; padding: 0; }
body { height: 300vh; overflow-x: hidden; cursor: auto; }
#blob_container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
}
</style>
</head>
<body>

<div id="blob_container"></div>

<script>
var shape = { wave1: {amplitude: 200, frequency: 7.692, phase: 6.283}, wave2: {amplitude: 200, frequency: 7.912, phase: 6.283}, wave3: {amplitude: 200, frequency: 10, phase: 6.283} };
new BlobAnimation("blob_container", {
    BLOB_SIZE: 220,
    BLOB_DISTANCE: 1000,
    DETALISATION: 60,
    PERSPECTIVE_DISTORTION: 1,
    ROTATION_SPEED: 5,
    DOT_SIZE: (window.innerWidth > 480) ? 1.021 : 0.6,
    DOT_COLOR: "#d0d0d0",
    MOUSE_DISTANCE_MIN: 20,
    MOUSE_DISTANCE_MAX: 400,
    MOUSE_SENSITIVITY: 1,
    INERTIAL_TIME: 4,
    INITIAL_SHAPE: shape,
    USE_WAVE_MOTION: true,
    USE_WAVE_SWING: true,
    USE_MORPHING: true,
    MORPHING_AUTOPLAY: true,
    MORPHING_DURATION: 1,
    MORPHING_DELAY: 0,
    MORPHING_TRANSITION_TYPE: "cubic",
    MORPHING_SHAPES: [shape],
    WAVE_1_MOTION_SPEED: 1.3,
    WAVE_2_MOTION_SPEED: 0.8
});
</script>

</body>
</html>
