<style>
@font-face {
    font-family: 'Grumpy 24';
    src: url('css/fonts/Grumpy-Black24.woff2') format('woff2'),
        url('css/fonts/Grumpy-Black24.woff') format('woff'),
        url('css/fonts/Grumpy-Black24.ttf') format('truetype');
    font-weight: 900;
    font-style: normal;
}
html, body { background: #000; margin: 0; padding: 0; width: 100%; max-width: 100%; }
html { overflow-x: hidden; }
body { overflow-x: hidden; cursor: auto; touch-action: pan-y; }
* { box-sizing: border-box; }

/* Sphere stays fixed behind EVERYTHING for the whole page — the carousel
   below is a continuation of this same dark scene, not a new section. */
#blob_container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
    z-index: 0;
}

#hero {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
#page-title {
    margin: 0;
    text-align: center;
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: clamp(2.6rem, 7vw, 5rem);
    line-height: 1.05;
    color: #fff;
}

/* --- Filter pills: inline in the flow, same transparent backdrop as
   everything else — not a boxed section, just part of the continuous page. --- */
#filter-bar {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 0 6% 50px;
}
.filter-pill {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 12px 22px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.25);
    background: transparent;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all .2s ease;
}
.filter-pill.active,
.filter-pill:hover {
    background: #fff;
    border-color: #fff;
    color: #1c1c1c;
}

/* --- Blog preview carousel: same dark backdrop, no section break --- */
#carousel-section {
    position: relative;
    z-index: 1;
    background: transparent;
    padding: 0 6% 140px;
}
.carousel-grid {
    max-width: 1000px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
}
.carousel-stage {
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 300px;
    margin: 0 auto;
    overflow: hidden;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
}
.carousel-card {
    position: absolute;
    top: 0;
    left: 50%;
    width: 220px;
    height: 280px;
    margin-left: -110px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.25);
    background: #000;
    opacity: 0;
    transition: transform .35s ease, opacity .35s ease, border-color .35s ease;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 22px;
    box-sizing: border-box;
    cursor: pointer;
}
.carousel-card.active {
    z-index: 10;
    pointer-events: auto;
    border-color: rgba(255,255,255,0.55);
    opacity: 1;
    cursor: default;
}
.carousel-card.prev,
.carousel-card.next {
    z-index: 5;
    pointer-events: auto;
    opacity: 0.4;
}
.carousel-card-blob {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: #000;
}
.carousel-card-fade {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.1) 65%);
    pointer-events: none;
}
.carousel-card-cat {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin: 0 0 10px;
    position: relative;
    z-index: 2;
}
.carousel-card-title {
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: 1.55rem;
    line-height: 1.18;
    color: #fff;
    margin: 0;
    position: relative;
    z-index: 2;
}

.carousel-text { padding: 16px 0; }
.carousel-cat {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin: 0 0 8px;
}
.carousel-title {
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: 2rem;
    line-height: 1.15;
    margin: 0 0 24px;
    color: #fff;
    min-height: 96px;
}
.carousel-quote {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    line-height: 1.7;
    color: rgba(255,255,255,0.6);
    margin: 0;
    min-height: 110px;
}
.carousel-controls {
    display: flex;
    gap: 14px;
    margin-top: 32px;
}
.carousel-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease, transform 0.2s ease;
}
.carousel-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }

@media (max-width: 720px) {
    .carousel-grid { grid-template-columns: 1fr; gap: 32px; }
    .carousel-text { text-align: center; }
    .carousel-controls { justify-content: center; }
    .carousel-title { min-height: 0; }
    .carousel-quote { min-height: 0; }
}

/* --- Card flip + full-screen article overlay --- */
.carousel-card.flipping { transform: rotateY(90deg) !important; transition: transform .3s ease !important; }

#article-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #fff;
    color: #1c1c1c;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    /* Without the body scroll lock, keep overlay scrolling from chaining
       through to the page underneath. */
    overscroll-behavior: contain;
    opacity: 0;
    visibility: hidden;
    /* iOS Safari can keep a -webkit-overflow-scrolling:touch layer
       capturing touch/scroll input even while hidden, which is what was
       eating the card swipes and page scroll. pointer-events:none while
       closed guarantees touches pass straight through to the page. */
    pointer-events: none;
    /* Plain full-screen fade — no card-position geometry animation, since
       that depended on live measurements at tap time and was unreliable
       on mobile (slow, sometimes not opening, sometimes stuck open). */
    transition: opacity .3s ease, visibility 0s linear .3s;
}
#article-overlay.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transition: opacity .3s ease;
}
.article-close {
    position: fixed;
    top: 24px; right: 24px;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.15);
    background: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
}
.article-inner {
    max-width: 680px;
    margin: 0 auto;
    padding: 100px 6% 140px;
}
.article-cat {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.4);
    margin: 0 0 16px;
}
.article-title {
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    line-height: 1.1;
    margin: 0 0 32px;
    color: #1c1c1c;
}
.article-body p {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 17px;
    line-height: 1.8;
    color: rgba(0,0,0,0.72);
    margin: 0 0 24px;
}

</style>
</head>

<section id="carousel-section">

</div>

    BLOB_SIZE: 220,
    BLOB_DISTANCE: 1000,
    DETALISATION: 60,
    PERSPECTIVE_DISTORTION: 1,

    MORPHING_DELAY: 0,

});

        });
    }

    function closeArticle(){
        overlay.classList.remove('open');
        // Same nudge on the way back to black.
        requestAnimationFrame(function(){
            window.scrollBy(0, 1);
            window.scrollBy(0, -1);
        });
    }

    document.getElementById('article-close').addEventListener('click', closeArticle);

    cards.forEach(function(card, i){
        card.addEventListener('click', function(){
            if (card.classList.contains('prev')) { prev(); return; }
            if (card.classList.contains('next')) { next(); return; }
            if (card.classList.contains('active')) { openArticle(card, posts[i]); }
        });
    });

    // Touch swipe (mobile) + mouse drag (desktop) — both directions, circular.
    var startX = null, dragging = false;
    function onStart(x){ startX = x; dragging = true; }
    function onEnd(x){
        if (!dragging || startX === null) return;
        dragging = false;
        var delta = x - startX;
        startX = null;
        if (Math.abs(delta) < 30) return;
        if (delta < 0) next(); else prev();
    }
    stage.addEventListener('touchstart', function(e){ onStart(e.touches[0].clientX); }, { passive: true });
    stage.addEventListener('touchend', function(e){ onEnd(e.changedTouches[0].clientX); }, { passive: true });
    stage.addEventListener('mousedown', function(e){ onStart(e.clientX); });
    window.addEventListener('mouseup', function(e){ if (dragging) onEnd(e.clientX); });

    // Language switch — shares the same localStorage key as the homepage,
    // so a language choice made on either page carries over to the other.
    var prevBtn = document.getElementById('carousel-prev');
    var nextBtn = document.getElementById('carousel-next');
    var closeBtn = document.getElementById('article-close');

    function applyLang(newLang){
        lang = newLang;
        posts = postsByLang[lang];
        document.documentElement.setAttribute('lang', lang);
        localStorage.setItem(LANG_KEY, lang);

        document.getElementById('page-title').innerHTML = uiText[lang].pageTitle;
        prevBtn.setAttribute('aria-label', uiText[lang].prev);
        nextBtn.setAttribute('aria-label', uiText[lang].next);
        closeBtn.setAttribute('aria-label', uiText[lang].close);

        pills.forEach(function(pill, i){
            var catIdx = categoryIndices[i];
            pill.textContent = catIdx === -1 ? uiText[lang].all : posts[catIdx].cat;
        });

        cardTextEls.forEach(function(refs, i){
            refs.cat.textContent = posts[i].cat;
            refs.title.textContent = posts[i].title;
        });

        // Re-localize the article overlay in place if it's currently open.
        if (overlay.classList.contains('open')) {
            var post = posts[active];
            articleCat.textContent = post.cat;
            articleTitle.textContent = post.title;
            articleBody.innerHTML = '';
            post.article.forEach(function(paragraph){
                var p = document.createElement('p');
                p.textContent = paragraph;
                articleBody.appendChild(p);
            });
        }

        render();
    }

    // No visible switch on this page — language is chosen on the homepage
    // and carried over here via the shared ss_lang localStorage key.
    applyLang(lang);
    setInterval(next, 5000);
})();
</script>

</body>
</html>
