<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — SEO Suite</title>
<meta name="theme-color" content="#000000">
<script src="js/libs/jsband-min.js"></script>
<script src="js/blob-min.js"></script>
<style>
@font-face {
    font-family: 'Grumpy 24';
    src: url('css/fonts/Grumpy-Black24.woff2') format('woff2'),
        url('css/fonts/Grumpy-Black24.woff') format('woff'),
        url('css/fonts/Grumpy-Black24.ttf') format('truetype');
    font-weight: 900;
    font-style: normal;
}
html, body { background: #000; margin: 0; padding: 0; width: 100%; max-width: 100%; }
html { overflow-x: hidden; }
body { overflow-x: hidden; cursor: auto; touch-action: pan-y; }
* { box-sizing: border-box; }

/* Sphere stays fixed behind EVERYTHING for the whole page — the carousel
   below is a continuation of this same dark scene, not a new section. */
#blob_container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
    z-index: 0;
}

#hero {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
#page-title {
    margin: 0;
    text-align: center;
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: clamp(2.6rem, 7vw, 5rem);
    line-height: 1.05;
    color: #fff;
}

/* --- Filter pills: inline in the flow, same transparent backdrop as
   everything else — not a boxed section, just part of the continuous page. --- */
#filter-bar {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 0 6% 50px;
}
.filter-pill {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 12px 22px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.25);
    background: transparent;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all .2s ease;
}
.filter-pill.active,
.filter-pill:hover {
    background: #fff;
    border-color: #fff;
    color: #1c1c1c;
}

/* --- Blog preview carousel: same dark backdrop, no section break --- */
#carousel-section {
    position: relative;
    z-index: 1;
    background: transparent;
    padding: 0 6% 140px;
}
.carousel-grid {
    max-width: 1000px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
}
.carousel-stage {
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 300px;
    margin: 0 auto;
    overflow: hidden;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
}
.carousel-card {
    position: absolute;
    top: 0;
    left: 50%;
    width: 220px;
    height: 280px;
    margin-left: -110px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.25);
    background: #000;
    opacity: 0;
    transition: transform .35s ease, opacity .35s ease, border-color .35s ease;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 22px;
    box-sizing: border-box;
    cursor: pointer;
}
.carousel-card.active {
    z-index: 10;
    pointer-events: auto;
    border-color: rgba(255,255,255,0.55);
    opacity: 1;
    cursor: default;
}
.carousel-card.prev,
.carousel-card.next {
    z-index: 5;
    pointer-events: auto;
    opacity: 0.4;
}
.carousel-card-blob {
    position: absolute;
    inset: 0;
    z-index: 0;
    background: #000;
}
.carousel-card-fade {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.1) 65%);
    pointer-events: none;
}
.carousel-card-cat {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin: 0 0 10px;
    position: relative;
    z-index: 2;
}
.carousel-card-title {
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: 1.55rem;
    line-height: 1.18;
    color: #fff;
    margin: 0;
    position: relative;
    z-index: 2;
}

.carousel-text { padding: 16px 0; }
.carousel-cat {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin: 0 0 8px;
}
.carousel-title {
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: 2rem;
    line-height: 1.15;
    margin: 0 0 24px;
    color: #fff;
    min-height: 96px;
}
.carousel-quote {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    line-height: 1.7;
    color: rgba(255,255,255,0.6);
    margin: 0;
    min-height: 110px;
}
.carousel-controls {
    display: flex;
    gap: 14px;
    margin-top: 32px;
}
.carousel-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s ease, transform 0.2s ease;
}
.carousel-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }

@media (max-width: 720px) {
    .carousel-grid { grid-template-columns: 1fr; gap: 32px; }
    .carousel-text { text-align: center; }
    .carousel-controls { justify-content: center; }
    .carousel-title { min-height: 0; }
    .carousel-quote { min-height: 0; }
}

/* --- Card flip + full-screen article overlay --- */
.carousel-card.flipping { transform: rotateY(90deg) !important; transition: transform .3s ease !important; }

#article-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #fff;
    color: #1c1c1c;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    /* Without the body scroll lock, keep overlay scrolling from chaining
       through to the page underneath. */
    overscroll-behavior: contain;
    opacity: 0;
    visibility: hidden;
    /* iOS Safari can keep a -webkit-overflow-scrolling:touch layer
       capturing touch/scroll input even while hidden, which is what was
       eating the card swipes and page scroll. pointer-events:none while
       closed guarantees touches pass straight through to the page. */
    pointer-events: none;
    /* Plain full-screen fade — no card-position geometry animation, since
       that depended on live measurements at tap time and was unreliable
       on mobile (slow, sometimes not opening, sometimes stuck open). */
    transition: opacity .3s ease, visibility 0s linear .3s;
}
#article-overlay.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transition: opacity .3s ease;
}
.article-close {
    position: fixed;
    top: 24px; right: 24px;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.15);
    background: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
}
.article-inner {
    max-width: 680px;
    margin: 0 auto;
    padding: 100px 6% 140px;
}
.article-cat {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(0,0,0,0.4);
    margin: 0 0 16px;
}
.article-title {
    font-family: 'Grumpy 24', Georgia, serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    line-height: 1.1;
    margin: 0 0 32px;
    color: #1c1c1c;
}
.article-body p {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 17px;
    line-height: 1.8;
    color: rgba(0,0,0,0.72);
    margin: 0 0 24px;
}

/* --- Language switch (top right) --- */
#lang-switch {
    position: fixed;
    top: max(24px, env(safe-area-inset-top, 0px) + 16px);
    right: max(24px, env(safe-area-inset-right, 0px) + 16px);
    z-index: 1100;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
}
#lang-switch .lang-opt {
    background: none;
    border: none;
    padding: 4px 2px;
    color: #ffffff;
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.2s ease, color 0.2s ease;
}
#lang-switch .lang-opt.active { opacity: 1; }
#lang-switch .lang-opt:hover { opacity: 0.8; }
#lang-switch .lang-sep { color: #ffffff; opacity: 0.3; }
body:has(#article-overlay.open) #lang-switch .lang-opt,
body:has(#article-overlay.open) #lang-switch .lang-sep { color: #1c1c1c; }
</style>
</head>
<body>

<div id="blob_container"></div>

<div id="lang-switch" role="group" aria-label="Language">
    <button type="button" class="lang-opt" data-lang="en">EN</button>
    <span class="lang-sep">/</span>
    <button type="button" class="lang-opt" data-lang="de">DE</button>
</div>

<div id="hero">
    <h1 id="page-title">Learn, Explore<br>&amp; Grow</h1>
</div>

<div id="filter-bar"></div>

<section id="carousel-section">
    <div class="carousel-grid">
        <div class="carousel-stage" id="carousel-stage"></div>
        <div class="carousel-text">
            <p class="carousel-cat" id="carousel-cat"></p>
            <h2 class="carousel-title" id="carousel-title"></h2>
            <p class="carousel-quote" id="carousel-quote"></p>
            <div class="carousel-controls">
                <button class="carousel-btn" id="carousel-prev" aria-label="Previous post">&larr;</button>
                <button class="carousel-btn" id="carousel-next" aria-label="Next post">&rarr;</button>
            </div>
        </div>
    </div>
</section>

<div id="article-overlay">
    <button class="article-close" id="article-close" aria-label="Close article">&times;</button>
    <div class="article-inner">
        <p class="article-cat" id="article-cat"></p>
        <h1 class="article-title" id="article-title"></h1>
        <div class="article-body" id="article-body"></div>
    </div>
</div>

<script>
var shape = { wave1: {amplitude: 200, frequency: 7.692, phase: 6.283}, wave2: {amplitude: 200, frequency: 7.912, phase: 6.283}, wave3: {amplitude: 200, frequency: 10, phase: 6.283} };
new BlobAnimation("blob_container", {
    BLOB_SIZE: 220,
    BLOB_DISTANCE: 1000,
    DETALISATION: 60,
    PERSPECTIVE_DISTORTION: 1,
    ROTATION_SPEED: 5,
    DOT_SIZE: (window.innerWidth > 480) ? 1.021 : 0.6,
    DOT_COLOR: "#d0d0d0",
    MOUSE_DISTANCE_MIN: 20,
    MOUSE_DISTANCE_MAX: 400,
    MOUSE_SENSITIVITY: 1,
    INERTIAL_TIME: 4,
    INITIAL_SHAPE: shape,
    USE_WAVE_MOTION: true,
    USE_WAVE_SWING: true,
    USE_MORPHING: true,
    MORPHING_AUTOPLAY: true,
    MORPHING_DURATION: 1,
    MORPHING_DELAY: 0,
    MORPHING_TRANSITION_TYPE: "cubic",
    MORPHING_SHAPES: [shape],
    WAVE_1_MOTION_SPEED: 1.3,
    WAVE_2_MOTION_SPEED: 0.8
});
</script>

    // Filter pills jump the carousel straight to the first post in that

    });

            pills.forEach(function(p){ p.classList.remove('active'); });
            pill.classList.add('active');
            if (catIdx !== -1) { active = catIdx; render(); }
        });
        filterBar.appendChild(pill);
        pills.push(pill);
    });
    pills[0].classList.add('active');

    // Each card gets its own morphing dot-sphere — the same shapes used
    // across the main site, so every post has a distinct silhouette that
    // moves independently instead of a photo.
    var cardShapes = [
        { wave1: {amplitude: 76.923, frequency: 0.879, phase: 0}, wave2: {amplitude: 60, frequency: 0.165, phase: 0}, wave3: {amplitude: 50, frequency: 0, phase: 0} },
        { wave1: {amplitude: 0, frequency: 0, phase: 0}, wave2: {amplitude: 0, frequency: 0, phase: 0}, wave3: {amplitude: 35, frequency: 10, phase: 0} },
        { wave1: {amplitude: 200, frequency: 7.692, phase: 6.283}, wave2: {amplitude: 200, frequency: 7.912, phase: 6.283}, wave3: {amplitude: 200, frequency: 10, phase: 6.283} },
        { wave1: {amplitude: 34.066, frequency: 5.934, phase: 0}, wave2: {amplitude: 20.879, frequency: 6.154, phase: 0}, wave3: {amplitude: 50.549, frequency: 0, phase: 0} }
    ];

    var cardTextEls = [];
    posts.forEach(function(post, i){
        var card = document.createElement('div');
        card.className = 'carousel-card';

        var blobDiv = document.createElement('div');
        blobDiv.className = 'carousel-card-blob';
        blobDiv.id = 'card-blob-' + i;
        card.appendChild(blobDiv);

        var fade = document.createElement('div');
        fade.className = 'carousel-card-fade';
        card.appendChild(fade);

        var cat = document.createElement('p');
        cat.className = 'carousel-card-cat';
        cat.textContent = post.cat;
        card.appendChild(cat);

        var title = document.createElement('h3');
        title.className = 'carousel-card-title';
        title.textContent = post.title;
        card.appendChild(title);

        cardTextEls.push({ cat: cat, title: title });

        stage.appendChild(card);
        cards.push(card);

        var shape = cardShapes[i % cardShapes.length];
        new BlobAnimation('card-blob-' + i, {
            BLOB_SIZE: 130,
            BLOB_DISTANCE: 1000,
            DETALISATION: 45,
            PERSPECTIVE_DISTORTION: 1,
            ROTATION_SPEED: 4 + i,
            DOT_SIZE: 0.9,
            DOT_COLOR: '#d0d0d0',
            MOUSE_DISTANCE_MIN: 20,
            MOUSE_DISTANCE_MAX: 400,
            MOUSE_SENSITIVITY: 1,
            INERTIAL_TIME: 4,
            INITIAL_SHAPE: shape,
            USE_WAVE_MOTION: true,
            USE_WAVE_SWING: true,
            USE_MORPHING: true,
            MORPHING_AUTOPLAY: true,
            MORPHING_DURATION: 1,
            MORPHING_DELAY: 0,
            MORPHING_TRANSITION_TYPE: 'cubic',
            MORPHING_SHAPES: [shape],
            WAVE_1_MOTION_SPEED: 1 + i * 0.3,
            WAVE_2_MOTION_SPEED: 0.6 + i * 0.2
        });
    });

    var SIDE_OFFSET = 150;

    function render(){
        var n = posts.length;
        cards.forEach(function(card, i){
            card.classList.remove('active', 'prev', 'next');
            // Position relative to active, wrapping both directions so the
            // deck always rotates — never a dead end at either edge.
            var rel = i - active;
            if (rel > n / 2) rel -= n;
            if (rel < -n / 2) rel += n;

            if (rel === 0) {
                card.classList.add('active');
                card.style.transform = 'translateX(0px) scale(1)';
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
            } else if (rel === -1 || (n === 2 && rel === 1)) {
                card.classList.add('prev');
                card.style.transform = 'translateX(-' + SIDE_OFFSET + 'px) scale(0.82)';
                card.style.opacity = '0.4';
                card.style.pointerEvents = 'auto';
            } else if (rel === 1) {
                card.classList.add('next');
                card.style.transform = 'translateX(' + SIDE_OFFSET + 'px) scale(0.82)';
                card.style.opacity = '0.4';
                card.style.pointerEvents = 'auto';
            } else {
                card.style.opacity = '0';
                card.style.transform = 'translateX(0px) scale(0.7)';
                card.style.pointerEvents = 'none';
            }
        });
        var post = posts[active];
        catEl.textContent = post.cat;
        titleEl.textContent = post.title;
        quoteEl.textContent = post.quote;
    }

    function next(){ active = (active + 1) % posts.length; render(); }
    function prev(){ active = (active - 1 + posts.length) % posts.length; render(); }

    document.getElementById('carousel-next').addEventListener('click', next);
    document.getElementById('carousel-prev').addEventListener('click', prev);

    var overlay = document.getElementById('article-overlay');
    var articleCat = document.getElementById('article-cat');
    var articleTitle = document.getElementById('article-title');
    var articleBody = document.getElementById('article-body');

    // Same continuous chrome-sync pattern that works on the homepage:
    // every frame, mirror the color the page should be onto <html> and the
    // theme-color meta. iOS Safari respects the every-frame loop where
    // one-shot changes were getting ignored/sampled at the wrong moment.
    (function(){
        var meta = document.querySelector('meta[name="theme-color"]');
        if (!meta) { meta = document.createElement('meta'); meta.setAttribute('name','theme-color'); document.head.appendChild(meta); }
        var last = '', lastMeta = '';
        // Ramp the color over the same 300ms as the overlay's CSS fade,
        // driven by our own clock rather than the overlay's computed
        // opacity — deterministic even if style sampling lags on iOS.
        var target = 0, current = 0, prevT = 0;
        function tick(t){
            if (!prevT) prevT = t;
            var step = (t - prevT) / 300;
            prevT = t;
            target = overlay.classList.contains('open') ? 1 : 0;
            if (current < target) current = Math.min(target, current + step);
            else if (current > target) current = Math.max(target, current - step);
            var o = current;
            var v = Math.round(o * 255);
            var raw = 'rgb(' + v + ', ' + v + ', ' + v + ')';
            if (raw !== last) {
                last = raw;
                document.documentElement.style.backgroundColor = raw;
                document.body.style.backgroundColor = raw;
            }
            var snapped = o < 0.5 ? '#000000' : '#ffffff';
            if (snapped !== lastMeta) { lastMeta = snapped; meta.setAttribute('content', snapped); }
            requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
    })();

    function openArticle(card, post){
        articleCat.textContent = post.cat;
        articleTitle.textContent = post.title;
        articleBody.innerHTML = '';
        post.article.forEach(function(paragraph){
            var p = document.createElement('p');
            p.textContent = paragraph;
            articleBody.appendChild(p);
        });
        overlay.scrollTop = 0;
        overlay.classList.add('open');
        // NO body scroll lock: iOS Safari only re-samples its bar tint on
        // scroll activity, and freezing the page at the exact moment the
        // color changes left the bars stuck black. The overlay covers the
        // page and scrolls itself, so the lock wasn't needed anyway.
        // Nudge the overlay's scroll by a pixel to poke Safari into
        // refreshing the bar color right away.
        requestAnimationFrame(function(){
            overlay.scrollTop = 1;
            overlay.scrollTop = 0;
        });
    }

    function closeArticle(){
        overlay.classList.remove('open');
        // Same nudge on the way back to black.
        requestAnimationFrame(function(){
            window.scrollBy(0, 1);
            window.scrollBy(0, -1);
        });
    }

    document.getElementById('article-close').addEventListener('click', closeArticle);

    cards.forEach(function(card, i){
        card.addEventListener('click', function(){
            if (card.classList.contains('prev')) { prev(); return; }
            if (card.classList.contains('next')) { next(); return; }
            if (card.classList.contains('active')) { openArticle(card, posts[i]); }
        });
    });

    // Touch swipe (mobile) + mouse drag (desktop) — both directions, circular.
    var startX = null, dragging = false;
    function onStart(x){ startX = x; dragging = true; }
    function onEnd(x){
        if (!dragging || startX === null) return;
        dragging = false;
        var delta = x - startX;
        startX = null;
        if (Math.abs(delta) < 30) return;
        if (delta < 0) next(); else prev();
    }
    stage.addEventListener('touchstart', function(e){ onStart(e.touches[0].clientX); }, { passive: true });
    stage.addEventListener('touchend', function(e){ onEnd(e.changedTouches[0].clientX); }, { passive: true });
    stage.addEventListener('mousedown', function(e){ onStart(e.clientX); });
    window.addEventListener('mouseup', function(e){ if (dragging) onEnd(e.clientX); });

    // Language switch — shares the same localStorage key as the homepage,
    // so a language choice made on either page carries over to the other.
    var prevBtn = document.getElementById('carousel-prev');
    var nextBtn = document.getElementById('carousel-next');
    var closeBtn = document.getElementById('article-close');

    function applyLang(newLang){
        lang = newLang;
        posts = postsByLang[lang];
        document.documentElement.setAttribute('lang', lang);
        localStorage.setItem(LANG_KEY, lang);

        document.getElementById('page-title').innerHTML = uiText[lang].pageTitle;
        prevBtn.setAttribute('aria-label', uiText[lang].prev);
        nextBtn.setAttribute('aria-label', uiText[lang].next);
        closeBtn.setAttribute('aria-label', uiText[lang].close);

        pills.forEach(function(pill, i){
            var catIdx = categoryIndices[i];
            pill.textContent = catIdx === -1 ? uiText[lang].all : posts[catIdx].cat;
        });

        cardTextEls.forEach(function(refs, i){
            refs.cat.textContent = posts[i].cat;
            refs.title.textContent = posts[i].title;
        });

        // Re-localize the article overlay in place if it's currently open.
        if (overlay.classList.contains('open')) {
            var post = posts[active];
            articleCat.textContent = post.cat;
            articleTitle.textContent = post.title;
            articleBody.innerHTML = '';
            post.article.forEach(function(paragraph){
                var p = document.createElement('p');
                p.textContent = paragraph;
                articleBody.appendChild(p);
            });
        }

        document.querySelectorAll('.lang-opt').forEach(function(btn){
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });

        render();
    }

    document.querySelectorAll('.lang-opt').forEach(function(btn){
        btn.addEventListener('click', function(){ applyLang(btn.dataset.lang); });
    });

    applyLang(lang);
    setInterval(next, 5000);
})();
</script>

</body>
</html>
