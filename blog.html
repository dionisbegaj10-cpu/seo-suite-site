var featuredPosts = posts.slice(0, 5);
var folderPosts = posts.slice(5);

var grid = document.getElementById("post-grid");
var filterBar = document.getElementById("filter-bar");

var categories = ["All"];
posts.forEach(function(p){
    if (categories.indexOf(p.cat) === -1) categories.push(p.cat);
});
var activeCat = "All";

function postCardHTML(p){
    return '<p class="post-card-cat">' + p.cat + '</p>' +
        '<h3 class="post-card-title">' + p.title + '</h3>' +
        '<p class="post-card-excerpt">' + p.quote + '</p>' +
        '<p class="post-card-meta">' + p.readingTime + '</p>';
}

function renderFeaturedGrid(){
    grid.innerHTML = "";

    if (activeCat === "All") {
        featuredPosts.forEach(function(p){
            var a = document.createElement("a");
            a.className = "post-card";
            a.href = "blog/" + p.slug + ".html";
            a.innerHTML = postCardHTML(p);
            grid.appendChild(a);
        });

        var folderCard = document.createElement("div");
        folderCard.className = "folder-card";
        folderCard.innerHTML =
            '<div class="folder-icon"><div class="folder-icon-tab"></div><div class="folder-icon-body"></div></div>' +
            '<p class="folder-card-title">More articles</p>' +
            '<p class="folder-card-count">+' + folderPosts.length + ' articles</p>';
        folderCard.addEventListener("click", openFolder);
        grid.appendChild(folderCard);
    } else {
        posts.filter(function(p){ return p.cat === activeCat; })
            .forEach(function(p){
                var a = document.createElement("a");
                a.className = "post-card";
                a.href = "blog/" + p.slug + ".html";
                a.innerHTML = postCardHTML(p);
                grid.appendChild(a);
            });
    }
}

function renderPills(){
    filterBar.innerHTML = "";
    categories.forEach(function(cat){
        var btn = document.createElement("button");
        btn.className = "filter-pill" + (cat === activeCat ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", function(){
            activeCat = cat;
            renderPills();
            renderFeaturedGrid();
        });
        filterBar.appendChild(btn);
    });
}

var folderOverlay = document.getElementById("folder-overlay");
var folderGrid = document.getElementById("folder-post-grid");
var folderFilterBar = document.getElementById("folder-filter-bar");
var folderCategories = ["All"];
folderPosts.forEach(function(p){
    if (folderCategories.indexOf(p.cat) === -1) folderCategories.push(p.cat);
});
var folderActiveCat = "All";

function renderFolderGrid(){
    folderGrid.innerHTML = "";
    folderPosts.filter(function(p){ return folderActiveCat === "All" || p.cat === folderActiveCat; })
        .forEach(function(p){
            var a = document.createElement("a");
            a.className = "post-card";
            a.href = "blog/" + p.slug + ".html";
            a.innerHTML = postCardHTML(p);
            folderGrid.appendChild(a);
        });
}

function renderFolderPills(){
    folderFilterBar.innerHTML = "";
    folderCategories.forEach(function(cat){
        var btn = document.createElement("button");
        btn.className = "filter-pill" + (cat === folderActiveCat ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", function(){
            folderActiveCat = cat;
            renderFolderPills();
            renderFolderGrid();
        });
        folderFilterBar.appendChild(btn);
    });
}

function openFolder(){
    folderOverlay.classList.add("open");
    document.body.style.overflow = "hidden";
}
function closeFolder(){
    folderOverlay.classList.remove("open");
    document.body.style.overflow = "";
}
document.getElementById("folder-close").addEventListener("click", closeFolder);
folderOverlay.addEventListener("click", function(e){
    if (e.target === folderOverlay) closeFolder();
});
document.addEventListener("keydown", function(e){
    if (e.key === "Escape" && folderOverlay.classList.contains("open")) closeFolder();
});

renderPills();
renderFeaturedGrid();
renderFolderPills();
renderFolderGrid();

(function(){
    function update(){ document.body.classList.toggle("scrolled", window.pageYOffset > 20); }
    window.addEventListener("scroll", update, { passive: true });
    update();
})();
