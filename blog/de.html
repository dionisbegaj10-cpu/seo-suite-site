var grid = document.getElementById("post-grid");
var filterBar = document.getElementById("filter-bar");

var categories = ["Alle"];
posts.forEach(function(p){
    if (categories.indexOf(p.cat) === -1) categories.push(p.cat);
});

var activeCat = "Alle";

function renderGrid(){
    grid.innerHTML = "";
    posts.filter(function(p){ return activeCat === "Alle" || p.cat === activeCat; })
        .forEach(function(p){
            var a = document.createElement("a");
            a.className = "post-card";
            a.href = "de/" + p.slug + ".html";
            a.innerHTML =
                '<p class="post-card-cat">' + p.cat + '</p>' +
                '<h3 class="post-card-title">' + p.title + '</h3>' +
                '<p class="post-card-excerpt">' + p.quote + '</p>' +
                '<p class="post-card-meta">' + p.readingTime + '</p>';
            grid.appendChild(a);
        });
}

function renderPills(){
    filterBar.innerHTML = "";
    categories.forEach(function(cat){
        var btn = document.createElement("button");
        btn.className = "filter-pill" + (cat === activeCat ? " active" : "");
        btn.textContent = cat;
        btn.addEventListener("click", function(){
            activeCat = cat;
            renderPills();
            renderGrid();
        });
        filterBar.appendChild(btn);
    });
}

renderPills();
renderGrid();

(function(){
    function update(){ document.body.classList.toggle("scrolled", window.pageYOffset > 20); }
    window.addEventListener("scroll", update, { passive: true });
    update();
})();
