<style>
@font-face {
    font-family: 'Grumpy 24';
    src: url('../css/fonts/Grumpy-Black24.woff2') format('woff2'),
        url('../css/fonts/Grumpy-Black24.woff') format('woff');
    font-weight: 900;
    font-style: normal;
    font-display: swap;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #000; color: #fff; width: 100%; max-width: 100%; overflow-x: hidden; overscroll-behavior: none; touch-action: pan-y; }
body { font-family: Arial, Helvetica, sans-serif; cursor: auto; }
a { color: inherit; }

#back-home {
    position: fixed;
    top: max(24px, env(safe-area-inset-top, 0px) + 16px);
    left: max(24px, env(safe-area-inset-left, 0px) + 16px);
    font-family: 'Grumpy 24', Georgia, serif;
    font-weight: 900;
    font-size: 1.1rem;
    text-decoration: none;
    z-index: 100;
    opacity: 1;
    pointer-events: auto;
    transition: opacity 0.35s ease;
}
body.scrolled #back-home { opacity: 0; pointer-events: none; }

/* --- Full-screen particle hero: logo assembles from scattered pixels,
   rotates gently, and zooms in as you scroll (matches the homepage's
   dot-sphere hero behavior, but shaped as the client's logo). --- */
.logo-sphere-container {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #000;
    touch-action: pan-y;
    overflow: hidden;
    transform: translateZ(0);
    -webkit-transform: translateZ(0);
    will-change: transform;
}
.logo-sphere-container img.logo-sphere-source {
    display: none;
}
.logo-sphere-canvas {
    position: absolute;
    inset: 0;
}

</style>

(function(){

    update();
})();
</script>
